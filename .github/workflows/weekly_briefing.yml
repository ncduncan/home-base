name: Home-Base Weekly Briefing

on:
  schedule:
    # 11:00 UTC every Sunday = 7am EST / 8am EDT
    - cron: '0 11 * * 0'
  workflow_dispatch:
    # Manual trigger for testing

# Public repo: keep run logs clean of personal content. The agent enforces
# this in code; this comment is a reminder for human edits.

jobs:
  briefing:
    name: Generate & send weekly briefing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weekly briefing
        working-directory: agent/briefing
        env:
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          ASANA_WORKSPACE_GID: ${{ secrets.ASANA_WORKSPACE_GID }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
        run: npm start
