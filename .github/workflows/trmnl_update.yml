name: TRMNL Display Update

on:
  push:
    branches: [main]
  schedule:
    # 6am, 12pm, 6pm Eastern Time (EDT = UTC-4)
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update:
    name: Push data to TRMNL display
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Write Google OAuth token
        run: |
          python3 -c "import os; open('/tmp/google_token.json','w').write(os.environ['GOOGLE_OAUTH_TOKEN'])"
        env:
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}

      - name: Push briefing to TRMNL
        env:
          GOOGLE_TOKEN_PATH: /tmp/google_token.json

          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          ASANA_WORKSPACE_GID: ${{ secrets.ASANA_WORKSPACE_GID }}

          OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}

          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}

        run: python -m agent.trmnl_update
